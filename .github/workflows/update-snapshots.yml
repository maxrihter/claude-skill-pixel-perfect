name: Update Visual Snapshots

# Manually triggered only — never auto-update baselines in CI.
# Silently overwriting baselines in CI defeats the purpose of visual regression testing.
on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you updating snapshots? (required for audit trail)'
        required: true
        type: string

permissions:
  contents: write  # required to push updated snapshot files

jobs:
  update-snapshots:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    container:
      # Must match the image used in visual-tests.yml to produce identical baselines
      image: mcr.microsoft.com/playwright:v1.50.1-noble
      # --ipc=host: required for Chromium in Docker.
      # Without it, renderer processes hit the 64MB /dev/shm limit and crash.
      options: --ipc=host

    steps:
      - uses: actions/checkout@v4
        with:
          # actions/checkout with token sets up the git credential helper automatically.
          # No need to manually configure git remote or credential.helper — it's handled.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-nm
        with:
          # Cache node_modules directly — faster than restoring the npm content store.
          # Avoids the ~/.npm path issue (host path vs /root in container).
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Install dependencies
        if: steps.cache-nm.outputs.cache-hit != 'true'
        run: npm ci

      - name: Update snapshots
        run: npx playwright test --update-snapshots
        env:
          CI: true

      - name: Commit updated snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add snapshots/

          # Only commit if there are actual changes
          if git diff --staged --quiet; then
            echo "No snapshot changes to commit."
          else
            git commit -m "chore: update visual snapshots

          Reason: ${{ github.event.inputs.reason }}
          Triggered by: @${{ github.actor }}
          Workflow run: ${{ github.run_id }}"

            # Push to the branch that triggered this workflow.
            # Never push to a detached HEAD or tag — fail explicitly if so.
            if [ -z "${{ github.ref_name }}" ]; then
              echo "Error: could not determine branch name. Was this triggered from a tag or detached HEAD?"
              exit 1
            fi
            git push origin HEAD:${{ github.ref_name }}
          fi
