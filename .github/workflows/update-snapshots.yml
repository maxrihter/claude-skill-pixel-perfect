name: Update Visual Snapshots

# Manually triggered only — never auto-update baselines in CI.
# Silently overwriting baselines in CI defeats the purpose of visual regression testing.
on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you updating snapshots? (required for audit trail)'
        required: true
        type: string

permissions:
  contents: write  # required to push updated snapshot files

jobs:
  update-snapshots:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    container:
      # Must match the image used in visual-tests.yml to produce identical baselines
      image: mcr.microsoft.com/playwright:v1.50.1-noble

    steps:
      - uses: actions/checkout@v4
        with:
          # Use GITHUB_TOKEN with write access — required for git push inside container
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Update snapshots
        run: npx playwright test --update-snapshots
        env:
          CI: true

      - name: Commit updated snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Configure remote with token for authenticated push inside Docker container
          git remote set-url origin \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

          git add snapshots/

          # Only commit if there are actual changes
          if git diff --staged --quiet; then
            echo "No snapshot changes to commit."
          else
            git commit -m "chore: update visual snapshots

          Reason: ${{ github.event.inputs.reason }}
          Triggered by: @${{ github.actor }}
          Workflow run: ${{ github.run_id }}"
            git push
          fi
