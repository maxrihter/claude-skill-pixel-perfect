name: Update Visual Snapshots

# Manually triggered only — never auto-update baselines in CI.
# Silently overwriting baselines in CI defeats the purpose of visual regression testing.
on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you updating snapshots? (required for audit trail)'
        required: true
        type: string

permissions:
  contents: write  # required to push updated snapshot files

jobs:
  update-snapshots:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    container:
      # Must match the image used in visual-tests.yml to produce identical baselines
      image: mcr.microsoft.com/playwright:v1.50.1-noble
      # --ipc=host: required for Chromium in Docker.
      # Without it, renderer processes hit the 64MB /dev/shm limit and crash.
      options: --ipc=host

    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history so git push works correctly inside container
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-nm
        with:
          # Cache node_modules directly — faster than restoring the npm content store.
          # Avoids the ~/.npm path issue (host path vs /root in container).
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Install dependencies
        if: steps.cache-nm.outputs.cache-hit != 'true'
        run: npm ci

      - name: Update snapshots
        run: npx playwright test --update-snapshots
        env:
          CI: true

      - name: Commit updated snapshots
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Use credential helper to authenticate git push inside Docker container.
          # This avoids exposing the token in `git remote -v` or .git/config.
          git config --global credential.helper \
            '!f() { echo "username=x-access-token"; echo "password=$GITHUB_TOKEN"; }; f'

          git add snapshots/

          # Only commit if there are actual changes
          if git diff --staged --quiet; then
            echo "No snapshot changes to commit."
          else
            git commit -m "chore: update visual snapshots

          Reason: ${{ github.event.inputs.reason }}
          Triggered by: @${{ github.actor }}
          Workflow run: ${{ github.run_id }}"
            git push
          fi
