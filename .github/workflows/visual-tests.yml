name: Visual Regression Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  visual-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    container:
      # Use the official Playwright Docker image — same renderer as your baselines.
      # ⚠️ Keep this version in sync with @playwright/test in package.json.
      #   To check the installed version: node -e "console.log(require('./package-lock.json').packages['node_modules/@playwright/test'].version)"
      image: mcr.microsoft.com/playwright:v1.50.1-noble
      # --ipc=host: required for Chromium in Docker.
      # Without it, renderer processes hit the 64MB /dev/shm limit and crash.
      options: --ipc=host

    steps:
      - uses: actions/checkout@v4

      - name: Get npm cache directory
        id: npm-cache-dir
        # npm config get cache returns the absolute path inside the container (/root/.npm).
        # Do NOT cache node_modules directly — npm ci always removes it before installing.
        # Do NOT use ~/.npm as a path literal — ~ resolves on the host, not inside the container.
        run: echo "dir=$(npm config get cache)" >> $GITHUB_OUTPUT

      - name: Cache npm store
        uses: actions/cache@v4
        with:
          # Cache the npm content-addressable store (tarballs), not node_modules.
          # restore-keys is safe here: npm ci always rebuilds node_modules from cached tarballs,
          # so a partial cache hit from restore-keys just saves bandwidth, not correctness.
          path: ${{ steps.npm-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Install dependencies
        # Always run npm ci — it's fast when the npm store is cached (~5s vs ~60s cold).
        # Do NOT skip on cache-hit: npm ci must always run to build node_modules from the store.
        run: npm ci

      - name: Run visual regression tests
        run: npx playwright test
        env:
          CI: true

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 7
